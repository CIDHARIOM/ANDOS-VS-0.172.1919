    <script>
        // ==================== GLOBAL AUTO-LINK ASSET CONFIG ====================
        const ASSET_CONFIG = Object.freeze({
            base_url: "https://raw.githubusercontent.com/CIDHARIOM/ANDOS-VS-0.172.1919/main/assets/"
        });

        /** Builds every repository asset URL from one configurable base path. */
        function getAsset(folder, fileName) {
            const cleanFolder = String(folder || '').replace(/^\/+|\/+$/g, '');
            const cleanFileName = String(fileName || '').replace(/^\/+/, '');
            return ASSET_CONFIG.base_url + cleanFolder + '/' + cleanFileName;
        }

        window.ASSET_CONFIG = ASSET_CONFIG;
        window.getAsset = getAsset;

        // Permanent white theme: manual and device dark-mode switching are disabled.
        (function () {
            try { localStorage.removeItem('andos_dark_pref'); } catch (e) {}
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
        })();
    </script>

        /* ---- MODALS ---- */
        /* Boot loader styles consolidated in ANDOS ENTERPRISE BOOT below. */

        /* Page transition wrapper - applied to <main> content on every render */
        .page-enter {
            animation: pageFadeSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes pageFadeSlide {
            from { opacity: 0; transform: translateY(18px) scale(0.99); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* Staggered reveal for grids/lists (service cards, plan cards, order cards) */
        .reveal-stagger > * {
            opacity: 0;
            animation: revealUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(22px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .reveal-stagger > *:nth-child(1) { animation-delay: 0.03s; }
        .reveal-stagger > *:nth-child(2) { animation-delay: 0.08s; }
        .reveal-stagger > *:nth-child(3) { animation-delay: 0.13s; }
        .reveal-stagger > *:nth-child(4) { animation-delay: 0.18s; }
        .reveal-stagger > *:nth-child(5) { animation-delay: 0.23s; }
        .reveal-stagger > *:nth-child(6) { animation-delay: 0.28s; }
        .reveal-stagger > *:nth-child(7) { animation-delay: 0.33s; }
        .reveal-stagger > *:nth-child(8) { animation-delay: 0.38s; }
        .reveal-stagger > *:nth-child(n+9) { animation-delay: 0.42s; }

        /* Ripple touch feedback (Material-style) for any clickable element */
        .ripple-surface { position: relative; overflow: hidden; }
        .ripple-wave {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            background: rgba(255,255,255,0.55);
            pointer-events: none;
            animation: rippleAnim 0.6s ease-out;
            mix-blend-mode: overlay;
        }
        .ripple-dark .ripple-wave { background: rgba(79,70,229,0.18); mix-blend-mode: normal; }
        @keyframes rippleAnim {
            to { transform: scale(2.6); opacity: 0; }
        }

        /* Smooth press feedback for any interactive surface */
        button, .nav-item, .service-card, [onclick] {
            -webkit-tap-highlight-color: transparent;
        }

        /* Sidebar items subtle slide-in when sidebar opens */
        .sidebar.translate-x-0 nav .nav-item {
            animation: navItemIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .sidebar.translate-x-0 nav .nav-item:nth-child(1) { animation-delay: 0.05s; }
        .sidebar.translate-x-0 nav .nav-item:nth-child(2) { animation-delay: 0.09s; }
        .sidebar.translate-x-0 nav .nav-item:nth-child(3) { animation-delay: 0.13s; }
        .sidebar.translate-x-0 nav .nav-item:nth-child(4) { animation-delay: 0.17s; }
        .sidebar.translate-x-0 nav .nav-item:nth-child(5) { animation-delay: 0.21s; }
        .sidebar.translate-x-0 nav .nav-item:nth-child(6) { animation-delay: 0.25s; }
        .sidebar.translate-x-0 nav .nav-item:nth-child(7) { animation-delay: 0.29s; }
        @keyframes navItemIn {
            from { opacity: 0; transform: translateX(-16px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Smooth scroll-reveal for elements with [data-animate] using IntersectionObserver */
        [data-animate] {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        [data-animate].in-view {
            opacity: 1;
            transform: translateY(0);
        }

        /* Subtle floating glow blobs for hero/header (pure CSS, GPU friendly) */
        .float-blob {
            position: absolute; border-radius: 50%; filter: blur(40px);
            animation: floatBlob 8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes floatBlob {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(12px, -16px) scale(1.08); }
        }

        /* Success checkmark draw animation */
        .check-draw circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            animation: checkCircle 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }
        .check-draw path {
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: checkMark 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards;
        }
        @keyframes checkCircle { to { stroke-dashoffset: 0; } }
        @keyframes checkMark { to { stroke-dashoffset: 0; } }

        /* Smooth number count-up helper class */
        .count-up { display: inline-block; }

        /* Skeleton loading shimmer block (used while a page's data is "loading") */
        .skel {
            background: linear-gradient(90deg, #e9edf3 25%, #f3f6fa 37%, #e9edf3 63%);
            background-size: 400% 100%;
            animation: skelShimmer 1.4s ease infinite;
            border-radius: 14px;
        }
        @keyframes skelShimmer {
            0% { background-position: 100% 50%; }
            100% { background-position: 0 50%; }
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 380px) {
            .otp-input { width: 44px; height: 52px; }
        }

        /* ---- ACCESSIBILITY ---- */
        /* Respect reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        /* ---- DARK MODE ---- */
        html.dark body { background: var(--bg-body) !important; color: var(--text-primary) !important; }
        html.dark .bg-slate-50 { background: #0e1422 !important; }
        html.dark .bg-white { background: var(--bg-card) !important; }
        html.dark .glass-nav { background: var(--nv-glass) !important; border-bottom-color: var(--border-primary) !important; }
        html.dark .text-gray-900 { color: var(--text-primary) !important; }
        html.dark .text-gray-800 { color: var(--text-secondary) !important; }
        html.dark .text-gray-700 { color: var(--text-secondary) !important; }
        html.dark .text-gray-600 { color: var(--text-muted) !important; }
        html.dark .text-gray-500 { color: var(--text-muted) !important; }
        html.dark .text-gray-400 { color: #64748b !important; }
        html.dark .border-gray-100, html.dark .border-gray-200, html.dark .border-slate-100 { border-color: var(--border-primary) !important; }
        html.dark .bg-gray-50 { background: #0e1422 !important; }
        html.dark .bg-gray-100 { background: #1e293b !important; }
        html.dark .service-card, html.dark .plan-card, html.dark .order-item, html.dark .stat-card { background: var(--bg-card) !important; border-color: var(--border-primary) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important; }
        html.dark .input-field { background: var(--bg-input); border-color: var(--border-primary); color: var(--text-primary); }
        html.dark .sidebar { background: var(--bg-sidebar) !important; }
        html.dark .skel, html.dark .skeleton { background: linear-gradient(90deg,#141c2c 25%,#1e293b 37%,#141c2c 63%); }
        html.dark ::-webkit-scrollbar-thumb { background: #1e293b; }
        html, body { transition: background-color 0.35s ease, color 0.35s ease; }

        /* ---- SEARCH BAR ---- */
        .search-bar {
            background: white; border-radius: 20px; border: 1.5px solid #e5e7eb;
            transition: all 0.25s ease; display: flex; align-items: center; gap: 10px; padding: 12px 16px;
        }
        .search-bar:focus-within { border-color: #4F46E5; box-shadow: 0 0 0 4px rgba(79,70,229,0.1); }
        html.dark .search-bar { background: #131826; border-color: #263049; }
        .search-bar input { border: none; outline: none; background: transparent; width: 100%; font-weight: 600; font-size: 14px; }
        html.dark .search-bar input { color: #e2e8f0; }

        /* ---- FAVORITE HEART ---- */
        .fav-heart { transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), color 0.25s ease; cursor: pointer; }
        .fav-heart:active { transform: scale(0.8); }
        .fav-heart.active { color: #f43f5e; animation: heartPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes heartPop { 0% { transform: scale(1); } 40% { transform: scale(1.4); } 100% { transform: scale(1); } }

        /* ---- COUPON CHIP ---- */
        .coupon-chip {
            border: 2px dashed #c7d2fe; border-radius: 16px; background: linear-gradient(135deg,#eef2ff,#f5f3ff);
            transition: all 0.25s ease; cursor: pointer; position: relative;
        }
        .coupon-chip:hover { border-color: #6366f1; transform: translateY(-2px); }
        .coupon-chip.applied { border-color: #10b981; background: linear-gradient(135deg,#ecfdf5,#d1fae5); border-style: solid; }
        html.dark .coupon-chip { background: linear-gradient(135deg,#1e1b4b,#1e2247); border-color: #4338ca; }

        /* ---- STAR RATING ---- */
        .star-rating i { transition: all 0.2s ease; cursor: pointer; }
        .star-rating i:hover, .star-rating i.active { color: #fbbf24; transform: scale(1.15); }

        /* ---- OTP INPUT ---- */
        .otp-input {
            width: 48px; height: 56px; text-align: center; font-size: 22px; font-weight: 800;
            border: 2px solid #e5e7eb; border-radius: 16px; transition: all 0.2s ease;
        }
        .otp-input:focus { border-color: #4F46E5; box-shadow: 0 0 0 4px rgba(79,70,229,0.12); outline: none; transform: translateY(-2px); }
        html.dark .otp-input { background: #161b2c; border-color: #263049; color: #e2e8f0; }

        /* ---- PIN DOTS ---- */
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #c7d2fe; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
        .pin-dot.filled { background: #4F46E5; border-color: #4F46E5; transform: scale(1.15); }
        .pin-key { transition: all 0.15s ease; cursor: pointer; }
        .pin-key:active { transform: scale(0.9); background: #eef2ff; }

        /* ---- CONFETTI ---- */
        #confettiCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 9998; }

        /* ---- BADGES / LOYALTY ---- */
        .loyalty-badge {
            background: linear-gradient(135deg,#fbbf24,#f59e0b); color: #78350f;
            animation: badgeShine 2.5s ease-in-out infinite;
        }
        @keyframes badgeShine { 0%,100% { box-shadow: 0 0 0 rgba(251,191,36,0); } 50% { box-shadow: 0 0 20px rgba(251,191,36,0.5); } }

        /* ---- INSTALL BANNER ---- */
        #installBanner {
            position: fixed; left: 16px; right: 16px; bottom: 16px; z-index: 250;
            transform: translateY(140%); transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
        }
        #installBanner.show { transform: translateY(0); }

        /* ---- HOME PROMOTIONAL CAROUSEL ---- */
        .home-carousel {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 24px;
            background: #e2e8f0;
            box-shadow: 0 18px 45px -18px rgba(15, 23, 42, 0.32);
            isolation: isolate;
            touch-action: pan-y;
        }
        .home-carousel-track {
            display: flex;
            width: 100%;
            transition: transform 520ms cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }
        .home-carousel-slide {
            position: relative;
            flex: 0 0 100%;
            aspect-ratio: 16 / 7;
            min-height: 148px;
            max-height: 340px;
            background: #111827;
        }
        .home-carousel-slide img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .home-carousel-control {
            position: absolute;
            top: 50%;
            z-index: 3;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            color: white;
            background: rgba(15, 23, 42, 0.48);
            border: 1px solid rgba(255,255,255,.22);
            box-shadow: 0 8px 20px rgba(0,0,0,.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transform: translateY(-50%);
            transition: background 180ms ease, transform 180ms ease;
        }
        .home-carousel-control:hover { background: rgba(15, 23, 42, 0.72); }
        .home-carousel-control:active { transform: translateY(-50%) scale(.9); }
        .home-carousel-control.prev { left: 10px; }
        .home-carousel-control.next { right: 10px; }
        .home-carousel-dots {
            position: absolute;
            left: 50%;
            bottom: 11px;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 9px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.36);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transform: translateX(-50%);
        }
        .home-carousel-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: rgba(255,255,255,.55);
            transition: width 260ms ease, background 260ms ease;
        }
        .home-carousel-dot.active { width: 21px; background: white; }
        html.dark .home-carousel { background: #1f2937; }
        @media (max-width: 480px) {
            .home-carousel { border-radius: 20px; }
            .home-carousel-slide { aspect-ratio: 16 / 8; min-height: 132px; }
            .home-carousel-control { width: 34px; height: 34px; font-size: 12px; }

        /* ---- FORMS ---- */
        .verify-shell {
            position: relative;
            min-height: calc(100vh - 78px);
            display: flex; align-items: center; justify-content: center;
            padding: 24px 20px;
        }
        .verify-card {
            width: 100%; max-width: 440px;
            background: white; border-radius: 28px;
            box-shadow: 0 30px 60px -20px rgba(15,23,42,0.18), 0 8px 24px -8px rgba(15,23,42,0.08);
            overflow: hidden;
            animation: verifyPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes verifyPop {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        html.dark .verify-card { background: #131826; box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5), 0 8px 24px -8px rgba(0,0,0,0.3); }

        .verify-hero {
            position: relative; padding: 28px 24px 20px;
            color: white; overflow: hidden;
        }
        .verify-hero::after {
            content: ''; position: absolute; inset: auto -20% -50% auto;
            width: 220px; height: 220px; border-radius: 50%;
            background: rgba(255,255,255,0.08); filter: blur(20px);
        }
        .verify-hero::before {
            content: ''; position: absolute; inset: -40% auto auto -15%;
            width: 180px; height: 180px; border-radius: 50%;
            background: rgba(255,255,255,0.06); filter: blur(14px);
        }
        .verify-body { padding: 22px 22px 24px; }

        .verify-step-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .verify-step-dot.active { background: #4F46E5; transform: scale(1.25); box-shadow: 0 0 0 4px rgba(79,70,229,0.18); }
        .verify-step-dot.done   { background: #10b981; }
        .verify-step-line { flex: 1; height: 2px; background: #e5e7eb; border-radius: 99px; transition: background 0.4s ease; }
        .verify-step-line.done { background: #10b981; }

        .verify-input {
            width: 100%; padding: 16px 18px;
            border: 2px solid #e5e7eb; border-radius: 16px;
            font-size: 16px; font-weight: 700;
            transition: all 0.2s ease;
            background: #f8fafc;
        }
        .verify-input:focus {
            border-color: #4F46E5; background: white;
            box-shadow: 0 0 0 4px rgba(79,70,229,0.12);
            outline: none;
        }

        html.dark .verify-input:focus { background: #1c2336; }

        .verify-loader {
            display: inline-block; width: 22px; height: 22px;
            border: 3px solid #4F46E5; border-bottom-color: transparent;

        }
        .verify-loader.light { border-color: rgba(255,255,255,0.9); border-bottom-color: transparent; }

        .verify-success-tick {
            display: inline-flex; align-items: center; justify-content: center;
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 10px 30px rgba(16,185,129,0.35);
            animation: tickPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes tickPop {
            0%   { opacity: 0; transform: scale(0.4); }
            70%  { transform: scale(1.15); }
            100% { opacity: 1; transform: scale(1); }
        }

        .verify-info-card {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);

            animation: slideUpFade 0.45s ease-out both;

/* ANDOS ENTERPRISE BOOT */
/* =========================================================
   ANDOS — Enterprise SaaS Boot Loader
   Vercel / Linear / Apple — ultra-minimal
   Replaces: /* Boot / splash loader *\/ … #bootLoader
   ========================================================= */

#bootLoader {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ffffff;
  color: #0f172a;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  /* buttery enterprise exit */
  transition:
    opacity .52s cubic-bezier(.16,1,.3,1),
    transform .52s cubic-bezier(.16,1,.3,1),
    visibility .52s linear;
  will-change: opacity, transform;
}

html.dark #bootLoader {
  background: #0b0e16;
  color: #e6e8ef;
}

/* hidden / dismissed state */
#bootLoader.boot-hidden {
  opacity: 0;
  visibility: hidden;
  transform: scale(1.018) translateY(-3px);
  pointer-events: none;
}

/* ——— stage ——— */
.boot-stage {
  text-align: center;
  padding: 24px;
  min-width: 260px;
  animation: bootStageIn .48s cubic-bezier(.16,1,.3,1) both;
}
@keyframes bootStageIn {
  from { opacity: 0; transform: translateY(8px) scale(.985); filter: blur(2px); }
  to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

/* ——— geometric mark ——— */
.boot-mark-wrap {
  position: relative;
  width: 52px;
  height: 52px;
  margin: 0 auto 18px;
}
.boot-mark {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: #0f172a;
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 17.5px;
  letter-spacing: -0.055em;
  /* subtle premium inner highlight */
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.14),
    0 10px 30px rgba(15,23,42,.08);
}
html.dark .boot-mark {
  background: #f8fafc;
  color: #0b0e16;
  box-shadow:
    inset 0 1px 0 rgba(0,0,0,.06),
    0 10px 30px rgba(0,0,0,.35);
}

/* razor-thin ring – SVG */
.boot-ring {
  position: absolute;
  inset: -7px;
  width: 66px;
  height: 66px;
  color: #d4d7de;
  animation: bootSpin 1.12s linear infinite;
  will-change: transform;
}
html.dark .boot-ring { color: #252c3f; }
@keyframes bootSpin { to { transform: rotate(360deg); } }

/* respect reduced motion */
@media (prefers-reduced-motion: reduce) {
  .boot-ring, .boot-dot { animation: none !important; }
  #bootLoader, .boot-stage { transition-duration: .001ms !important; }
}

/* ——— typography ——— */
.boot-title {
  font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, "SF Pro Display", Inter, sans-serif;
  font-weight: 900;
  font-size: 12.5px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: inherit;
}
.boot-kicker {
  margin-top: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #6b7280;
}
html.dark .boot-kicker { color: #7a8194; }

/* status line */
.boot-status {
  margin-top: 18px;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .015em;
  color: #6b7280;
}
html.dark .boot-status { color: #9aa0b3; }

.boot-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #10b981;
  box-shadow: 0 0 0 0 rgba(16,185,129,.45);
  animation: bootDotPulse 1.9s ease-out infinite;
  flex-shrink: 0;
}
@keyframes bootDotPulse {
  0%   { box-shadow: 0 0 0 0 rgba(16,185,129,.45); }
  65%  { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
  100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}

/* footer meta – ultra light */
.boot-foot {
  position: absolute;
  bottom: 22px;
  left: 0; right: 0;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: #9aa0b3;
  opacity: .72;
}
html.dark .boot-foot { color: #4b5568; }
.boot-sep { margin: 0 .55em; opacity: .55; }

/* Remove old boot-logo / boot-bar styles if still in CSS – safe override */
.boot-logo, .boot-text, .boot-bar, .boot-bar-fill { display: none !important; }

/* PAYMENT VERIFICATION PROCESS */
.payment-verification-page {
  min-height: 100vh;
  background: #ffffff;
  position: relative;
  overflow: hidden;
}
.payment-verification-page::before,
.payment-verification-page::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
}
.payment-verification-page::before {
  width: 230px;
  height: 230px;
  top: -90px;
  right: -70px;
  background: rgba(99,102,241,.16);
}
.payment-verification-page::after {
  width: 190px;
  height: 190px;
  bottom: -70px;
  left: -80px;
  background: rgba(14,165,233,.12);
}
.payment-verify-orbit {
  width: 118px;
  height: 118px;
  margin: 0 auto;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.payment-verify-orbit::before,
.payment-verify-orbit::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 2px solid transparent;
}
.payment-verify-orbit::before {
  inset: 0;
  border-top-color: #4f46e5;
  border-right-color: rgba(79,70,229,.22);
  animation: paymentVerifySpin 1.05s linear infinite;
}
.payment-verify-orbit::after {
  inset: 10px;
  border-bottom-color: #0ea5e9;
  border-left-color: rgba(14,165,233,.20);
  animation: paymentVerifySpinReverse 1.45s linear infinite;
}
.payment-verify-core {
  width: 74px;
  height: 74px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 25px;
  background: linear-gradient(135deg,#4f46e5,#2563eb);
  box-shadow: 0 18px 42px rgba(79,70,229,.30), inset 0 1px 0 rgba(255,255,255,.30);
}
.payment-verify-progress {
  height: 7px;
  overflow: hidden;
  border-radius: 999px;
  background: #e9edf5;
}
.payment-verify-progress > span {
  display: block;
  height: 100%;
  width: 8%;
  border-radius: inherit;
  background: linear-gradient(90deg,#4f46e5,#0ea5e9);
  animation: paymentVerifyProgress 5.2s cubic-bezier(.2,.75,.2,1) forwards;
}
.payment-verify-active-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4f46e5;
  box-shadow: 0 0 0 0 rgba(79,70,229,.35);
  animation: paymentVerifyPulse 1.3s ease-out infinite;
}
@keyframes paymentVerifySpin { to { transform: rotate(360deg); } }
@keyframes paymentVerifySpinReverse { to { transform: rotate(-360deg); } }
@keyframes paymentVerifyProgress { from { width: 8%; } to { width: 94%; } }
@keyframes paymentVerifyPulse {
  0% { box-shadow: 0 0 0 0 rgba(79,70,229,.35); }
  70% { box-shadow: 0 0 0 9px rgba(79,70,229,0); }
  100% { box-shadow: 0 0 0 0 rgba(79,70,229,0); }
}

            if (allOrders.length > 50) {
                const trimmed = allOrders.slice(0, 50);
                localStorage.setItem('andos_orders', JSON.stringify(trimmed));
                orders = trimmed;
            }
            // Remove old transactions
            const transactions = readLocalJSON('andos_transactions', []);
            if (transactions.length > 50) {
                localStorage.setItem('andos_transactions', JSON.stringify(transactions.slice(0, 50)));
            }
            showToast('Storage cleaned up automatically', 'info');
        }
    }

    // ==================== HELPERS ====================
    /** Displays a transient toast message without forcing a full page render. */
    function showToast(message, type = 'success') {
        const id = Date.now();
        toasts.push({ id, message, type });
        renderToasts();
        setTimeout(() => {
            toasts = toasts.filter(t => t.id !== id);
            renderToasts();
        }, APP_CONSTANTS.TOAST_DURATION_MS);
    }

    function renderToasts() {
        const container = getDOMElement('toastContainer');
        if (!container) return;
        const colors = {
            success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-amber-500'
        };
        const icons = {
            success: 'fa-check-circle', error: 'fa-circle-xmark', info: 'fa-circle-info', warning: 'fa-triangle-exclamation'
        };
        container.innerHTML = toasts.map(t => `
            <div class="toast ${colors[t.type]} text-white px-5 py-4 rounded-2xl shadow-xl flex items-center gap-3 min-w-[280px] pointer-events-auto">
                <i class="fa-solid ${icons[t.type]} text-xl flex-shrink-0"></i>
                <span class="font-semibold text-sm leading-snug">${escapeHtml(t.message)}</span>
            </div>
        `).join('');
    }

    /** Centralized router: updates page state, cleans transient state, and triggers render. */
    function navigate(page, params = {}) {
        // Handle category page
        if (page === 'category' && params.category) {
            selectedCategory = params.category;
        }
        // Clear any running payment timer
        if (_paymentTimerInterval) {
            clearInterval(_paymentTimerInterval);
            _paymentTimerInterval = null;
        }
        // Clear payment monitoring
        paymentMonitoring = false;
        localStorage.removeItem('andos_payment_active');

        currentPage = page;
        if (params.service) selectedService = params.service;
        if (params.plan) selectedPlan = params.plan;
        // Reset inline verify bar UI when entering the plans page for a service
        if (page === 'plans') {
            verifyBarInput = '';
            verifyBarError = '';
            verifyBarLoading = false;
        }
        if (!['home', 'search'].includes(page)) {
            searchQuery = '';
                _searchSelection = { start: 0, end: 0 };
        }
        sidebarOpen = false;
        window.scrollTo(0, 0);
        render();
    }

    function formatPrice(price) {
        const safeAmount = Number.isFinite(Number(price)) ? Number(price) : 0;
        return '₹' + safeAmount.toLocaleString('en-IN');
    }

    function generateOrderId() {
        return '#VSM' + Math.random().toString(36).substr(2, 6).toUpperCase();
    }

    /** Persists a new order while keeping local storage within the configured size budget. */
    function saveOrder(order) {
        orders.unshift(order);
        localStorage.setItem('andos_orders', JSON.stringify(orders));
        cleanupLocalStorage();
    }

    /** Persists wallet balance and synchronizes in-memory state. */
    function saveWallet(amount) {
        wallet = amount;
        localStorage.setItem('andos_wallet', wallet.toString());
    }

    /**
     * Returns the dynamic field config for the OrderFormPage "Your Details" section.
     * For social services (Instagram / YouTube / Facebook) the label + placeholder
     * change based on the selected plan name.
     *   - Followers / Subscribers  → Profile / Channel URL
     *   - Likes / Views / Watch Time → Post / Video URL
     * Returns null when the service should keep its existing non-dynamic label.
     */
    function dynamicFieldForPlan(plan, service) {
        if (!plan || !service) return null;
        if (service.category !== 'social') return null;
        const n = (plan.name || '').toLowerCase();
        if (/followers|subscribers|subscriber/.test(n)) {
            return {
                key: 'profile',
                label: 'Profile / Channel URL',
                placeholder: 'https://instagram.com/yourhandle',
                type: 'url',
                helper: 'Paste the public URL of the profile or channel',
                inputmode: 'url'
            };
        }
        if (/likes|views|watch\s*time|watch\s*hours|reel/.test(n)) {
            return {
                key: 'post',
                label: 'Post / Video URL',
                placeholder: 'https://... (paste post or video link)',
                type: 'url',
                helper: 'Paste the URL of the specific post or video',
                inputmode: 'url'
            };
        }
        return {
            key: 'generic',
            label: 'Profile / Channel Link',
            placeholder: 'https://instagram.com/yourhandle',
            type: 'url',
            helper: 'Public link is required',
            inputmode: 'url'
        };
    }

    window.togglePasswordVisibility = (inputId, iconId) => {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input && icon) {
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';

                icon.classList.add('fa-eye');
            }
        }
    };

    function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
    }

    function getDeviceInfo() {
        const userAgent = navigator.userAgent;
        let os = "Unknown OS";
        let browser = "Unknown Browser";
        if (userAgent.indexOf("Win") !== -1) os = "Windows";
        if (userAgent.indexOf("Mac") !== -1) os = "macOS";
        if (userAgent.indexOf("Linux") !== -1) os = "Linux";
        if (userAgent.indexOf("Android") !== -1) os = "Android";
        if (userAgent.indexOf("like Mac") !== -1) os = "iOS";

        if (userAgent.indexOf("Chrome") !== -1) browser = "Chrome";
        else if (userAgent.indexOf("Safari") !== -1) browser = "Safari";
        else if (userAgent.indexOf("Firefox") !== -1) browser = "Firefox";
        return { os, browser, screen: `${window.innerWidth}x${window.innerHeight}` };
    }

    // ---- Profile Synchronizer ----
    function syncUserProfile(firebaseUser, method, additionalData = {}) {
        const profileData = {
            uid: firebaseUser.uid,
            name: additionalData.name || firebaseUser.displayName || 'ANDOS User',
            username: additionalData.username || (firebaseUser.email ? firebaseUser.email.split('@')[0] : 'user_' + firebaseUser.uid.slice(-6)),
            email: firebaseUser.email || '',
            photoURL: DEFAULT_AVATAR_URL,
            provider: firebaseUser.providerData?.[0]?.providerId || 'password',
            lastLoginAt: new Date().toISOString(),
            loginMethod: method,
            deviceInfo: getDeviceInfo()
        };

        if (isFirebaseEnabled && db) {
            const userRef = db.collection('users').doc(firebaseUser.uid);
            return userRef.get().then((doc) => {
                if (!doc.exists) {
                    profileData.createdAt = new Date().toISOString();
                } else {
                    profileData.createdAt = doc.data().createdAt || new Date().toISOString();
                }
                return userRef.set(profileData, { merge: true }).then(() => {
                    user = {
                        uid: profileData.uid,
                        name: profileData.name,
                        username: profileData.username,
                        email: profileData.email,
                        mobile: additionalData.mobile || (doc.data() ? doc.data().mobile : '') || (firebaseUser.phoneNumber ? firebaseUser.phoneNumber.replace('+91', '') : '') || '',
                        photoURL: DEFAULT_AVATAR_URL,
                        provider: profileData.provider,
                        loggedIn: true,
                        isAdmin: doc.data() ? doc.data().isAdmin : false
                    };
                    localStorage.setItem('andos_user', JSON.stringify(user));
                    return user;
                });
            });
        } else {
            const mockUsers = readLocalJSON('andos_mock_users', []);
            let existingIdx = mockUsers.findIndex(u => u.uid === firebaseUser.uid);

            if (existingIdx === -1) {
                profileData.createdAt = new Date().toISOString();
                mockUsers.push({
                    ...profileData,
                    mobile: additionalData.mobile || firebaseUser.phoneNumber || ''
                });
            } else {
                profileData.createdAt = mockUsers[existingIdx].createdAt || new Date().toISOString();
                mockUsers[existingIdx] = {
                    ...mockUsers[existingIdx],
                    ...profileData,
                    mobile: additionalData.mobile || mockUsers[existingIdx].mobile || firebaseUser.phoneNumber || ''
                };
            }
            localStorage.setItem('andos_mock_users', JSON.stringify(mockUsers));

            user = {
                uid: profileData.uid,
                name: profileData.name,
                username: profileData.username,
                email: profileData.email,
                mobile: additionalData.mobile || (existingIdx !== -1 ? mockUsers[existingIdx].mobile : '') || '',
                photoURL: DEFAULT_AVATAR_URL,
                provider: profileData.provider,
                loggedIn: true,
                isAdmin: existingIdx !== -1 ? mockUsers[existingIdx].isAdmin : false
            };
            localStorage.setItem('andos_user', JSON.stringify(user));
            return Promise.resolve(user);
        }
    }

    function saveMockUserToDatabase(mockUser) {
        const mockUsers = readLocalJSON('andos_mock_users', []);
        let existingIdx = mockUsers.findIndex(u => u.uid === mockUser.uid);
        if (existingIdx === -1) {
            mockUsers.push({
                uid: mockUser.uid,
                displayName: mockUser.displayName,
                email: mockUser.email,
                mobile: mockUser.mobile,
                photoURL: DEFAULT_AVATAR_URL,
                createdAt: new Date().toISOString(),
                emailVerified: mockUser.emailVerified
            });
        } else {
            mockUsers[existingIdx].displayName = mockUser.displayName;
            mockUsers[existingIdx].mobile = mockUser.mobile;
            mockUsers[existingIdx].email = mockUser.email;
        }
        localStorage.setItem('andos_mock_users', JSON.stringify(mockUsers));
    }

    window.handleEmailSignUp = (e) => {
        if (e) e.preventDefault();
        const name = document.getElementById('signupName')?.value.trim();
        const email = document.getElementById('signupEmail')?.value.trim();
        const mobile = document.getElementById('signupMobile')?.value.trim();
        const password = document.getElementById('signupPassword')?.value;
        const confirmPassword = document.getElementById('signupConfirmPassword')?.value;
        const terms = document.getElementById('signupTerms')?.checked;

        if (!name || !email || !mobile || !password || !confirmPassword) { showToast("Please fill in all fields", "error"); return; }
        if (!validateEmail(email)) { showToast("Please enter a valid email", "error"); return; }
        if (mobile.length !== 10 || isNaN(mobile)) { showToast("Please enter a valid 10-digit mobile number", "error"); return; }
        if (password.length < 6) { showToast("Password must be at least 6 characters", "error"); return; }
        if (password !== confirmPassword) { showToast("Passwords do not match", "error"); return; }
        if (!terms) { showToast("Please accept the Terms & Conditions", "error"); return; }

        setAuthLoading(true);

        if (isFirebaseEnabled) {
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const firebaseUser = userCredential.user;
                    return firebaseUser.updateProfile({ displayName: name })
                        .then(() => {
                            firebaseUser.sendEmailVerification().catch(err => console.warn("Email verification send failed", err));
                            return syncUserProfile(firebaseUser, 'email_signup', { mobile, name });
                        });
                })
                .then(() => {
                    authStep = 'email-verify';
                    setAuthLoading(false);
                    render();
                })
                .catch((error) => {
                    setAuthLoading(false);
                    showToast("Sign up failed: " + error.message, "error");
                });
        } else {
            setTimeout(() => {
                const mockUser = {
                    uid: 'mock_email_user_' + Math.random().toString(36).substr(2, 9),
                    displayName: name,
                    email: email,
                    photoURL: DEFAULT_AVATAR_URL,
                    mobile: mobile,
                    emailVerified: false

                _pendingVerifyUser = mockUser;
                authStep = 'email-verify';
                setAuthLoading(false);
                showToast("Account created! Verification email dispatched.", "success");
                render();
            }, 1200);
        }

    // ---- Mobile Phone OTP Actions ----
    window.sendPhoneOtp = (e) => {
        if (e) e.preventDefault();
        const mobile = document.getElementById('loginMobile')?.value.trim();
        if (!mobile || mobile.length !== 10 || isNaN(mobile)) {
            showToast("Please enter a valid 10-digit mobile number", "error");
            return;
        }

        setAuthLoading(true);
        pendingMobile = mobile;

        if (isFirebaseEnabled) {
            const recaptchaContainer = document.getElementById('recaptcha-container');
            if (!recaptchaContainer) {
                const div = document.createElement('div');
                div.id = 'recaptcha-container';
                document.body.appendChild(div);
            }

            const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
            auth.signInWithPhoneNumber("+91" + mobile, appVerifier)
                .then((confirmationResult) => {
                    window.phoneConfirmationResult = confirmationResult;
                    setAuthLoading(false);
                    authStep = 'otp';
                    otpTimer = APP_CONSTANTS.OTP_RESEND_SECONDS;
                    startOtpTimer();
                    showToast("Real Security OTP dispatched!", "success");
                    render();
                    setTimeout(() => {
                        const firstOtp = document.querySelector('[data-otp-idx="0"]');
                        if (firstOtp) firstOtp.focus();
                    }, 150);
                })
                .catch((error) => {
                    setAuthLoading(false);
                    showToast("OTP dispatch failed: " + error.message, "error");
                });
        } else {
            setTimeout(() => {
                demoOtp = Math.floor(100000 + Math.random() * 900000).toString();
                setAuthLoading(false);
                authStep = 'otp';
                otpTimer = APP_CONSTANTS.OTP_RESEND_SECONDS;
                startOtpTimer();
                showToast("Demo Security OTP dispatched successfully!", "success");
                render();
                setTimeout(() => {
                    const firstOtp = document.querySelector('[data-otp-idx="0"]');
                    if (firstOtp) firstOtp.focus();
                }, 150);
            }, 1200);
        }
    };

    window.resendPhoneOtp = () => {
        if (otpTimer > 0) return;
        otpTimer = APP_CONSTANTS.OTP_RESEND_SECONDS;
        startOtpTimer();
        showToast("OTP resent successfully!", "info");

        if (isFirebaseEnabled) {
            const recaptchaContainer = document.getElementById('recaptcha-container');
            const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
            auth.signInWithPhoneNumber("+91" + pendingMobile, appVerifier)
                .then((confirmationResult) => {
                    window.phoneConfirmationResult = confirmationResult;
                    showToast("New OTP dispatched!", "success");
                })
                .catch((error) => {
                    showToast("Resend failed: " + error.message, "error");
                });
        } else {
            demoOtp = Math.floor(100000 + Math.random() * 900000).toString();
            showToast("Demo OTP: " + demoOtp, "info");
        }
        render();
    };

    window.verifyPhoneOtp = (e) => {
        if (e) e.preventDefault();
        const inputs = document.querySelectorAll('[data-otp-idx]');
        const entered = Array.from(inputs).map(i => i.value).join('');

        if (entered.length < APP_CONSTANTS.OTP_LENGTH) {
            showToast("Please enter complete 6-digit OTP", "error");
            return;
        }

        setAuthLoading(true);

        if (isFirebaseEnabled && window.phoneConfirmationResult) {
            window.phoneConfirmationResult.confirm(entered)
                .then((result) => {
                    return syncUserProfile(result.user, 'phone');
                })
                .then(() => {
                    setAuthLoading(false);
                    currentPage = 'home';
                    showToast("Identity verified! Welcome to ANDOS 🎉", "success");
                    triggerConfetti();
                    render();
                })
                .catch((error) => {
                    setAuthLoading(false);
                    showToast("Incorrect OTP code. Please try again.", "error");
                });
        } else {
            setTimeout(() => {
                if (entered !== demoOtp) {
                    setAuthLoading(false);
                    showToast("Incorrect OTP. Demo OTP is " + demoOtp, "error");
                    return;
                }
                const mockUser = {
                    uid: 'mock_phone_user_' + pendingMobile,
                    displayName: 'User ' + pendingMobile.slice(-4),
                    email: 'user_' + pendingMobile + '@vault.io',
                    photoURL: DEFAULT_AVATAR_URL,
                    mobile: pendingMobile,
                    emailVerified: true
                };
                saveMockUserToDatabase(mockUser);

                user = {
                    uid: mockUser.uid,
                    name: mockUser.displayName,
                    username: mockUser.email.split('@')[0],
                    email: mockUser.email,
                    mobile: mockUser.mobile,
                    photoURL: DEFAULT_AVATAR_URL,
                    provider: 'phone',
                    loggedIn: true,
                    isAdmin: false
                };
                localStorage.setItem('andos_user', JSON.stringify(user));

                setAuthLoading(false);
                currentPage = 'home';
                showToast("OTP Verified! Welcome to ANDOS 🎉", "success");
                triggerConfetti();
                render();
            }, 1200);
        }
    };

    // Keep backwards compatibility mappings
    window.sendOtp = window.sendPhoneOtp;
    window.verifyOtp = window.verifyPhoneOtp;
    window.resendOtp = window.resendPhoneOtp;

    window.handleOtpInput = (el, idx) => {
        el.value = el.value.replace(/[^0-9]/g, '').slice(0, 1);
        if (el.value && idx < APP_CONSTANTS.OTP_LENGTH - 1) {
            const next = document.querySelector(`[data-otp-idx="${idx + 1}"]`);
            if (next) next.focus();
        }
        const inputs = document.querySelectorAll('[data-otp-idx]');
        const entered = Array.from(inputs).map(i => i.value).join('');
        if (entered.length === APP_CONSTANTS.OTP_LENGTH) {
            window.verifyPhoneOtp();
        }
    };

    window.handleOtpKeydown = (e, idx) => {
        if (e.key === 'Backspace' && !e.target.value && idx > 0) {
            const prev = document.querySelector(`[data-otp-idx="${idx - 1}"]`);
            if (prev) {
                prev.focus();
                prev.value = '';
            }
        }
    };

    window.handleOtpPaste = (e) => {
        e.preventDefault();
        const pasteData = (e.clipboardData || window.clipboardData).getData('text');
        const digits = pasteData.replace(/[^0-9]/g, '').slice(0, APP_CONSTANTS.OTP_LENGTH);
        if (digits.length > 0) {
            const inputs = document.querySelectorAll('[data-otp-idx]');
            inputs.forEach((input, idx) => {
                input.value = digits[idx] || '';
            });
            if (digits.length === APP_CONSTANTS.OTP_LENGTH) {
                window.verifyPhoneOtp();
            } else {
                const nextInput = inputs[digits.length];
                if (nextInput) nextInput.focus();
            }
        }
    };

    function startOtpTimer() {
        if (otpTimerInterval) clearInterval(otpTimerInterval);
        otpTimerInterval = setInterval(() => {
            otpTimer--;
            if (otpTimer <= 0) { clearInterval(otpTimerInterval); otpTimerInterval = null; }
            if (currentPage === 'login' && authStep === 'otp') render();
        }, 1000);
    }

    // ---- UI Helpers / Rendering ----
    /** Main view renderer for the single-file SPA. Keep page-specific DOM work delegated. */
    function render() {
        const app = getDOMElement('app');
        let content = '';

        // Auth gate bypassed - directly load dashboard
        if (currentPage === 'login') {
            currentPage = 'home';
        }

        switch(currentPage) {
            case 'home': content = HomePage(); break;
            case 'search': content = SearchPage(); break;
            case 'categories': content = CategoriesPage(); break;
            case 'category': content = CategoryDetailPage(); break;
            case 'plans': content = PlansPage(); break;
            case 'orderform': content = OrderFormPage(); break;
            case 'payment': content = PaymentPage(); break;
            case 'paymentverify': content = PaymentVerifyingPage(); break;
            case 'success': content = PendingPage(); break; // legacy URL is forced to Pending UI
            case 'pending': content = PendingPage(); break;
            case 'orders': content = OrdersPage(); break;
            case 'orderdetail': content = OrderDetailPage(); break;
            case 'wallet': content = WalletPage(); break;
            case 'profile': content = ProfilePage(); break;
            case 'refer': content = ReferPage(); break;
            case 'contact': content = ContactPage(); break;
            case 'upcoming': content = UpcomingPage(); break;
            case 'about': content = AboutPage(); break;
            case 'favorites': content = FavoritesPage(); break;
            case 'admin': content = AdminPage(); break;
            default: content = HomePage();
        }

        const showNav = ['home'].includes(currentPage);
        const showFooter = ['home'].includes(currentPage);
        const showBottomNav = !['admin', 'paymentverify'].includes(currentPage);

        clearDOMCache();
        app.innerHTML = `
            <div class="min-h-screen bg-white">
                <div id="toastContainer" class="fixed top-5 right-4 z-[300] space-y-3 pointer-events-none max-w-xs"></div>
                ${Sidebar()}
                ${showNav ? Navbar() : ''}
                <main class="page-enter" style="${showBottomNav ? 'padding-bottom:78px;' : ''}">${content}</main>
                ${showFooter ? Footer() : ''}
                ${showBottomNav ? BottomNav() : ''}
                ${PinLockOverlay()}
                ${GoogleChooserOverlay()}
                <canvas id="confettiCanvas"></canvas>
            </div>
        `;

        renderToasts();
        initScrollReveal();
        attachSearchListener();
        initHomeCarousel();

        // Start payment timer if on payment page
        if (currentPage === 'payment') {
            startPaymentTimer();
            paymentMonitoring = false;
            localStorage.removeItem('andos_payment_active');
            setTimeout(() => {
                const container = getDOMElement("qrcode");
                const deepLink = getDOMElement("upiDeepLink");
                if (container) {
                    container.innerHTML = "";
                    let amount, note;

                    if (paymentContext === 'wallet') {
                        amount = walletRechargeAmount;
                        note = 'Wallet Recharge';
                    } else {
                        const svc = SERVICES.find(s => s.id === selectedService);
                        const pln = PLANS[selectedService]?.find(p => p.id === selectedPlan);
                        if (!svc || !pln) return;
                        // FIX: QR MUST REFLECT QUANTITY × PRICE (same as wallet logic)
                        const qty = (typeof itemQuantity !== 'undefined' && itemQuantity) ? itemQuantity : ((typeof planQuantities !== 'undefined' && planQuantities[pln.id]) ? planQuantities[pln.id] : 1);
                        let baseTotal = pln.price * qty;
                        let discount = 0;
                        if (typeof appliedCoupon !== 'undefined' && appliedCoupon) {
                            const c = appliedCoupon;
                            if (!c.service || c.service === svc.id) {
                                if (baseTotal >= (c.minOrder || 0)) {
                                    discount = c.type === 'flat' ? c.value : Math.min(Math.round(baseTotal * c.value / 100), c.maxDiscount || Infinity);
                                }
                            }
                        }
                        amount = Math.max(baseTotal - discount, 0);
                        note = svc.title + ' - ' + pln.name + ' (x' + qty + ')';
                    }

                    const qrPayload = 'upi://pay?pa=' + CONFIG.upiId + '&pn=' + encodeURIComponent(CONFIG.merchantName) + '&am=' + amount + '&cu=INR&tn=' + encodeURIComponent(note) + '&mode=01&orgid=000000';
                    if (deepLink) deepLink.href = qrPayload;

                    new QRCode(container, {
                        text: qrPayload,
                        width: 220,
                        height: 220,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            }, APP_CONSTANTS.QR_RENDER_DELAY_MS);
        }
    }

    function updateHomeCarouselDOM() {
        const carousel = document.getElementById('homeCarousel');
        const track = document.getElementById('homeCarouselTrack');
        if (!carousel || !track) return;
        track.style.transform = `translateX(-${_homeCarouselIndex * 100}%)`;
        carousel.querySelectorAll('.home-carousel-slide').forEach((slide, index) => {
            slide.setAttribute('aria-hidden', index === _homeCarouselIndex ? 'false' : 'true');
        });
        carousel.querySelectorAll('.home-carousel-dot').forEach((dot, index) => {
            const active = index === _homeCarouselIndex;
            dot.classList.toggle('active', active);
            dot.setAttribute('aria-selected', active ? 'true' : 'false');
        });
    }

    function restartHomeCarouselAutoplay() {
        if (_homeCarouselTimer) clearInterval(_homeCarouselTimer);
        _homeCarouselTimer = null;
        if (currentPage !== 'home' || HOME_BANNERS.length < 2 || document.hidden) return;
        _homeCarouselTimer = setInterval(() => {
            _homeCarouselIndex = (_homeCarouselIndex + 1) % HOME_BANNERS.length;
            updateHomeCarouselDOM();
        }, 4500);
    }

    window.handleHomeBannerTap = (action, target) => {
        if (action === 'support') {
            navigate('contact');
            return;
        }
        selectedCampaign = target === 'services' ? 'services' : 'freefire';
        navigate('upcoming');
    };

    window.openCampaignPage = (campaign) => {
        selectedCampaign = campaign === 'services' ? 'services' : 'freefire';
        navigate('upcoming');
    };

    window.goToHomeSlide = (index) => {
        _homeCarouselIndex = ((index % HOME_BANNERS.length) + HOME_BANNERS.length) % HOME_BANNERS.length;
        updateHomeCarouselDOM();
        restartHomeCarouselAutoplay();
    };

    window.shiftHomeSlide = (direction) => {
        window.goToHomeSlide(_homeCarouselIndex + direction);
    };

    function initHomeCarousel() {
        if (_homeCarouselTimer) clearInterval(_homeCarouselTimer);
        _homeCarouselTimer = null;
        const carousel = document.getElementById('homeCarousel');
        if (!carousel) return;
        _homeCarouselIndex = Math.min(_homeCarouselIndex, HOME_BANNERS.length - 1);
        updateHomeCarouselDOM();
        carousel.addEventListener('mouseenter', () => {
            if (_homeCarouselTimer) clearInterval(_homeCarouselTimer);
            _homeCarouselTimer = null;
        });
        carousel.addEventListener('mouseleave', restartHomeCarouselAutoplay);
        carousel.addEventListener('focusin', () => {
            if (_homeCarouselTimer) clearInterval(_homeCarouselTimer);
            _homeCarouselTimer = null;
        });
        carousel.addEventListener('focusout', restartHomeCarouselAutoplay);
        carousel.addEventListener('touchstart', (event) => {
            _homeCarouselTouchStartX = event.changedTouches[0]?.clientX ?? null;
        }, { passive: true });
        carousel.addEventListener('touchend', (event) => {
            if (_homeCarouselTouchStartX === null) return;
            const endX = event.changedTouches[0]?.clientX ?? _homeCarouselTouchStartX;
            const deltaX = endX - _homeCarouselTouchStartX;
            _homeCarouselTouchStartX = null;
            if (Math.abs(deltaX) > 42) window.shiftHomeSlide(deltaX < 0 ? 1 : -1);
        }, { passive: true });
        restartHomeCarouselAutoplay();
    }

    // ==================== PAGES ====================
    function getFilteredServices() {
        const sortByRank = (arr) => {
            return [...arr].sort((a,b)=>{
                const ra = (typeof a.homeRank !== 'undefined') ? a.homeRank : 999;
                const rb = (typeof b.homeRank !== 'undefined') ? b.homeRank : 999;
                if (ra !== rb) return ra - rb;
                // keep original order for same rank
                return 0;
            });
        };
        const featuredServices = SERVICES.filter(s => !s.searchOnly);
        if (!searchQuery.trim()) return sortByRank(featuredServices);
        const q = searchQuery.trim().toLowerCase();
        return sortByRank(featuredServices.filter(s => s.title.toLowerCase().includes(q) || s.subtitle.toLowerCase().includes(q) || s.category.toLowerCase().includes(q)));
    }

    function renderStarsMini(serviceId) {
        const r = reviews[serviceId];
        if (!r || !r.count) return '';
        const avg = (r.total / r.count).toFixed(1);
        return `<span class="text-[10px] font-bold text-amber-500 bg-amber-50 px-1.5 py-0.5 rounded-md flex items-center gap-0.5 flex-shrink-0"><i class="fa-solid fa-star text-[9px]"></i>${avg}</span>`;
    }

    function getSearchPageData() {
        const q = searchQuery.trim().toLowerCase();
        const allServices = SERVICES;
        const services = allServices.filter(service => {
            if (!q) return true;
            return [service.id, service.title, service.subtitle, service.category]
                .some(value => String(value || '').toLowerCase().includes(q));
        });

        const plans = [];
        if (!q) return { services: allServices, plans };

        Object.entries(PLANS).forEach(([serviceId, servicePlans]) => {
            const service = SERVICES.find(item => item.id === serviceId) || {
                id: serviceId,
                title: serviceId.replace(/(^|_)([a-z])/g, (_, space, char) => (space ? ' ' : '') + char.toUpperCase()),
                subtitle: 'Digital service', category: 'service', iconBg: 'bg-indigo-600', faIcon: 'fa-solid fa-bolt'
            };
            const serviceMatches = !q || [service.id, service.title, service.subtitle, service.category]
                .some(value => String(value || '').toLowerCase().includes(q));
            (servicePlans || []).forEach(plan => {
                const planMatches = !q || [plan.id, plan.name, plan.data, plan.days, plan.desc, plan.tag]
                    .some(value => String(value || '').toLowerCase().includes(q));
                if (serviceMatches || planMatches) plans.push({ service, plan });
            });
        });
        return { services, plans };
    }

    function getCustomFreeFireQuote(value) {
        const raw = Number(value);
        const diamonds = Math.max(1000, Math.min(50000, Math.round((Number.isFinite(raw) ? raw : 1040) / 10) * 10));
        const original = Math.max(800, Math.round(diamonds * 0.8));
        const discount = diamonds >= 25000 ? 82 : diamonds >= 10000 ? 80 : diamonds >= 5000 ? 78 : 75;
        const offer = Math.max(200, Math.round(original * (1 - discount / 100)));
        return { diamonds, original, discount, offer };
    }

    // ---- Quantity Floor Helpers ----
    function getPlanQty(planId) {
        return (planQuantities[planId] || 1);
    }

    window.updatePlanQty = (planId, delta, price) => {
        const cur = getPlanQty(planId);
        const next = Math.max(1, cur + delta);
        planQuantities[planId] = next;
        const qtyEl = document.getElementById('qty-'+planId);
        const totalEl = document.getElementById('total-'+planId);
        const btnEl = document.getElementById('btn-'+planId);
        const msgEl = document.getElementById('lockmsg-'+planId);
        const total = price * next;
        const canCheckout = total >= 200;
        const needMore = Math.max(0, 200 - total);
        const needQty = needMore > 0 ? Math.ceil(needMore / price) : 0;

        if (qtyEl) qtyEl.textContent = next;
        if (totalEl) {
            totalEl.textContent = formatPrice(total);
            totalEl.className = 'text-[16px] font-black ' + (canCheckout ? 'text-emerald-600 dark:text-emerald-400' : 'text-gray-900 dark:text-white');
        }
        if (btnEl) {
            if (canCheckout) {
                btnEl.disabled = false;
                btnEl.classList.remove('is-locked');
                btnEl.innerHTML = '<i class="fa-solid fa-bolt"></i><span>Order Now – ' + formatPrice(total) + '</span><span class="text-[10px] opacity-80 font-bold ml-1">(' + next + '×)</span>';
                btnEl.setAttribute('onclick', "event.stopPropagation(); selectPlanWithQty('" + planId + "', " + next + ")");
            } else {
                btnEl.disabled = true;
                btnEl.classList.add('is-locked');
                btnEl.innerHTML = '<i class="fa-solid fa-lock"></i><span>Add ' + formatPrice(needMore) + ' to Unlock</span>';
                btnEl.setAttribute('onclick', "event.stopPropagation(); showToast('Min ₹200 required – Tap + to increase qty', 'warning')");
            }
        }
        if (msgEl) {
            if (canCheckout) {

    window.setCustomRedeem = function(amount) {

    window.validateCustomRedeem = function(input) {
        const hint = document.getElementById('customRedeemHint');
        const btn = document.getElementById('customRedeemBtn');
        const raw = input.value.trim();
        if (!raw) {
            if (btn) btn.disabled = false;
            return true;
        }
        const val = parseInt(raw, 10);
        if (isNaN(val) || val < 200) {
            if (btn) btn.disabled = true;
            return false;
        }
        if (val > 5000) {
            if (btn) btn.disabled = true;
            return false;
        }
        if (btn) btn.disabled = false;
        return true;
    };

    window.buyCustomRedeem = function() {
        if (typeof isServiceLocked === 'function' && isServiceLocked('redeem')) {
            showToast('Verify your delivery email first', 'warning');
            return;
        }
        const input = document.getElementById('customRedeemAmount');
        const val = input ? parseInt(input.value, 10) : NaN;
        const btn = document.getElementById('customRedeemBtn');

        if (!val || isNaN(val) || val < 200 || val > 5000) {
            showToast('Minimum order ₹200 required', 'error');
            if (input) { input.classList.add('verify-shake'); setTimeout(()=>input.classList.remove('verify-shake'), 450); input.focus(); }

        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="loader" style="width:16px;height:16px;border-width:2px"></span><span>Creating…</span>'; }

        setTimeout(() => {
            const customId = 'r_custom_' + val + '_' + Date.now();
            const customPlan = {
                id: customId,
                name: '₹' + val + ' Custom Redeem',
                price: val, // real price – UI will anchor +45-59%
                days: 'Instant',
                data: 'Email Delivery',
                popular: false,
                desc: `Google Play ₹${val} redeem code | Instant email delivery 0-60 seconds | PAN India valid | No GST | 1-month redeem validity | ANDOS secure delivery`

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showToast('Copied: ' + text, 'success');
        } catch (err) {
            showToast('Copy failed. Code: ' + text, 'info');
        }
        document.body.removeChild(textarea);

            verifyBarError = 'Please enter your ' + cfg.label.toLowerCase();

        setTimeout(() => {
            verifyBarLoading = false;

        if (_paymentTimerInterval) clearInterval(_paymentTimerInterval);
        _paymentTimerInterval = setInterval(() => {
            seconds--;
            if (timerEl) {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                timerEl.innerText = m + ':' + s;
            }
            if (seconds <= 0) {

                _paymentTimerInterval = null;

            }
        }, 1000);

    function beginPaymentVerification(amount, kind) {
        if (_paymentVerificationTimer || currentPage === 'paymentverify') return;
        const numericAmount = parseInt(amount);
        if (!numericAmount || numericAmount <= 0) {
            showToast('The payment amount is invalid.', 'error');
            return;
        }

        const details = pendingPaymentDetails || {};
        paymentVerification = {
            amount: numericAmount,
            kind: kind,
            serviceId: details.serviceId || selectedService,
            planId: details.planId || selectedPlan,
            quantity: details.quantity || itemQuantity || 1,
            mobile: details.mobile || user.mobile || '',
            detail: details.detail || '',
            reference: 'CHK' + Date.now().toString(36).toUpperCase().slice(-7),
            startedAt: Date.now()
        };

        navigate('paymentverify');
        _paymentVerificationTimer = setTimeout(finalizePaymentAsPending, APP_CONSTANTS.PAYMENT_VERIFY_DELAY_MS);
    }

    function finalizePaymentAsPending() {
        const check = paymentVerification;
        _paymentVerificationTimer = null;
        if (!check) {
            navigate('home');
            return;
        }

        if (check.kind === 'wallet-recharge') {
            const transactions = readLocalJSON('andos_transactions', []);
            transactions.unshift({
                type: 'credit',
                amount: check.amount,
                desc: 'Wallet Recharge - Pending',
                status: 'pending',
                reference: check.reference,
                date: new Date().toLocaleDateString('en-IN')
            });
            localStorage.setItem('andos_transactions', JSON.stringify(transactions.slice(0, 20)));
            paymentVerification = null;
            pendingPaymentDetails = null;
            paymentContext = 'order';
            showToast('Wallet recharge status is Pending.', 'info');
            navigate('wallet');
            return;
        }

        const service = SERVICES.find(s => s.id === check.serviceId);
        const plan = PLANS[check.serviceId]?.find(p => p.id === check.planId);
        if (!service || !plan) {
            paymentVerification = null;
            showToast('Order information was not found.', 'error');
            navigate('home');
            return;
        }

        if (check.kind === 'wallet-order') {
            if (wallet < check.amount) {
                paymentVerification = null;
                showToast('Wallet balance is insufficient.', 'error');
                navigate('wallet');
                return;
            }
            saveWallet(wallet - check.amount);
        }

        const order = {
            id: generateOrderId(),
            service: service.title,
            serviceId: service.id,
            plan: plan.name + (check.quantity > 1 ? ' (x' + check.quantity + ')' : ''),
            amount: check.amount,
            status: 'pending',
            displayStatus: 'Pending',
            customerMobile: check.mobile,
            customerDetail: check.detail,
            paymentCheckReference: check.reference,
            date: new Date().toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }),
            progress: 0
        };
        saveOrder(order);

        const transactions = readLocalJSON('andos_transactions', []);
        transactions.unshift({
            type: 'debit',
            amount: check.amount,
            desc: service.title + ' - Payment Pending',
            status: 'pending',
            reference: check.reference,
            date: new Date().toLocaleDateString('en-IN')
        });
        localStorage.setItem('andos_transactions', JSON.stringify(transactions.slice(0, 20)));
        clearCouponSession();
        paymentVerification = null;
        pendingPaymentDetails = null;
        showToast('Payment check finished. The order is Pending.', 'info');
        navigate('pending');

    // ---- Confetti celebration (lightweight canvas-based) ----
    /** Lightweight celebration effect used after successful auth, wallet, and order events. */
    function triggerConfetti() {
        const canvas = document.getElementById('confettiCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const colors = ['#4F46E5', '#7C3AED', '#F59E0B', '#10B981', '#F43F5E', '#3B82F6'];
        const pieces = Array.from({ length: APP_CONSTANTS.CONFETTI_PIECES }, () => ({
            x: Math.random() * canvas.width,
            y: -20 - Math.random() * canvas.height * 0.3,
            size: 6 + Math.random() * 6,
            color: colors[Math.floor(Math.random() * colors.length)],
            speedY: 2 + Math.random() * 3,
            speedX: -1.5 + Math.random() * 3,
            rotation: Math.random() * 360,
            rotSpeed: -8 + Math.random() * 16,
        }));
        let frame = 0;
        const maxFrames = APP_CONSTANTS.CONFETTI_MAX_FRAMES;
        function animate() {
            frame++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.x += p.speedX; p.y += p.speedY; p.rotation += p.rotSpeed;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                ctx.restore();
            });
            if (frame < maxFrames) requestAnimationFrame(animate);
            else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        requestAnimationFrame(animate);
    }

        if (file.size > 10 * 1024 * 1024) {

        const reader = new FileReader();
        reader.onload = event => {
            const image = new Image();
            image.onload = () => {
                const maxSide = 850;
                const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
                const canvas = document.createElement('canvas');
                canvas.width = Math.max(1, Math.round(image.width * scale));
                canvas.height = Math.max(1, Math.round(image.height * scale));
                const ctx = canvas.getContext('2d');
                ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
                let compressed = canvas.toDataURL('image/jpeg', 0.62);
                if (compressed.length > 700000) compressed = canvas.toDataURL('image/jpeg', 0.42);

    // Global ripple (Material-style) touch/click feedback on any interactive element
    function attachRipple(e) {
        const target = e.target.closest('button, .nav-item, .service-card, .ripple-surface, a.social-btn, [onclick]');
        if (!target) return;
        target.classList.add('ripple-surface');
        const wave = document.createElement('span');
        const size = Math.max(target.offsetWidth, target.offsetHeight) * 1.4;
        const rect = target.getBoundingClientRect();
        const point = e.touches ? e.touches[0] : e;
        const x = (point ? point.clientX : rect.left + rect.width / 2) - rect.left - size / 2;
        const y = (point ? point.clientY : rect.top + rect.height / 2) - rect.top - size / 2;
        wave.className = 'ripple-wave';
        wave.style.width = wave.style.height = size + 'px';
        wave.style.left = x + 'px';
        wave.style.top = y + 'px';
        target.appendChild(wave);
        setTimeout(() => wave.remove(), 650);
    }
    document.addEventListener('pointerdown', attachRipple, { passive: true });

    // IntersectionObserver based scroll-reveal for elements marked [data-animate]
    let scrollRevealObserver = null;
    function initScrollReveal() {
        if (!('IntersectionObserver' in window)) return;
        if (scrollRevealObserver) scrollRevealObserver.disconnect();
        scrollRevealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('in-view');
                    scrollRevealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
        document.querySelectorAll('[data-animate]').forEach(el => scrollRevealObserver.observe(el));
    }
