    window.setCustomRedeem = function(amount) {
        if (typeof isServiceLocked === 'function' && isServiceLocked(selectedService)) {
            showToast('Verify first to unlock custom redeem', 'warning');
            return;
        }
        const el = document.getElementById('customRedeemAmount');
        if (el) { el.value = amount; validateCustomRedeem(el); el.focus(); }
    };

    window.validateCustomRedeem = function(input) {
        const hint = document.getElementById('customRedeemHint');
        const btn = document.getElementById('customRedeemBtn');
        const raw = input.value.trim();
        if (!raw) {
            if (hint) { hint.className = 'text-[11px] text-gray-400 mt-2.5 leading-relaxed'; hint.innerHTML = 'Min <b>₹10</b> • Max <b>₹5000</b> • <span class="text-emerald-600 font-black">No GST • Instant code</span>'; }
            if (btn) btn.disabled = false;
            return true;
        }
        const val = parseInt(raw, 10);
        if (isNaN(val) || val < 10) {
            if (hint) { hint.className = 'text-[11px] text-amber-600 font-bold mt-2.5'; hint.textContent = 'Minimum redeem amount is ₹10'; }
            return false;
        }
        if (val > 5000) {
            if (hint) { hint.className = 'text-[11px] text-red-500 font-bold mt-2.5'; hint.textContent = 'Maximum redeem amount is ₹5000'; }
            if (btn) btn.disabled = true;
            return false;
        }
        if (hint) { hint.className = 'text-[11px] text-emerald-600 font-bold mt-2.5'; hint.innerHTML = `✓ ₹${val} Google Play Code – <span class="text-rose-500">Save ${anchor.saveDisplay}%</span> – Instant email delivery`; }
        if (btn) btn.disabled = false;
        return true;
    };

    window.buyCustomRedeem = function() {
        if (typeof isServiceLocked === 'function' && isServiceLocked('redeem')) {
            showToast('Verify your delivery email first', 'warning');
            return;
        }
        const input = document.getElementById('customRedeemAmount');
        const val = input ? parseInt(input.value, 10) : NaN;
        const btn = document.getElementById('customRedeemBtn');

        if (!val || isNaN(val) || val < 10 || val > 5000) {
            showToast('Enter amount between ₹10 and ₹5000', 'error');
            if (input) { input.classList.add('verify-shake'); setTimeout(()=>input.classList.remove('verify-shake'), 450); input.focus(); }
            return;
        }

        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="loader" style="width:16px;height:16px;border-width:2px"></span><span>Creating…</span>'; }

        setTimeout(() => {
            const customId = 'r_custom_' + val + '_' + Date.now();
            const customPlan = {
                id: customId,
                name: '₹' + val + ' Custom Redeem',
                price: val, // real price – UI will anchor +45-59%
                days: 'Instant',
                data: 'Email Delivery',
                popular: false,
                desc: `Google Play ₹${val} redeem code | Instant email delivery 0-60 seconds | PAN India valid | No GST | 1-month redeem validity | NS-VAULT secure delivery`
            };
            // clean previous customs
            PLANS.redeem = PLANS.redeem.filter(p => !String(p.id).startsWith('r_custom_'));
            PLANS.redeem.unshift(customPlan);
            selectedService = 'redeem';
            selectedPlan = customId;

            showToast('₹' + val + ' custom code ready – Save 50%!', 'success');
            navigate('orderform');
        }, 480);
    };

    window.submitFlowStep = () => {
        const flow = SERVICE_FLOWS[selectedService];
        if (!flow) return;

        const stepConfig = flow.orderTypes
            ? flow.orderTypes.find(ot => ot.key === flowOrderType)
            : flow.steps?.[0];

        if (!stepConfig) return;

        const raw = (flowInputValue || '').trim();
        if (!raw) {
            flowError = 'This field is required';
            render();
            return;
        }
        if (stepConfig.validator && !stepConfig.validator(raw)) {
            flowError = stepConfig.errorMsg || 'Please check your input';
            render();
            return;
        }

        flowError = '';
        flowLoading = true;
        render();

            flowLoading = false;

    function completeWalletOrder(total) {
        const service = SERVICES.find(s => s.id === selectedService);
        const plan = PLANS[selectedService]?.find(p => p.id === selectedPlan);
        saveWallet(wallet - total);
        const order = {
            id: generateOrderId(), service: service.title, serviceId: service.id,
            plan: plan.name, amount: total, status: 'processing',
            date: new Date().toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }),
            progress: 30
        };
        if (service.id === 'redeem' || service.category === 'giftcard') {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 4; i++) { for (let j = 0; j < 4; j++) code += chars[Math.floor(Math.random() * chars.length)]; if (i < 3) code += '-'; }
            order.redeemCode = code;
        }
        saveOrder(order);
        const transactions = readLocalJSON('nsvault_transactions', []);
        transactions.unshift({ type: 'debit', amount: total, desc: service.title + ' - ' + plan.name, date: new Date().toLocaleDateString('en-IN') });
        localStorage.setItem('nsvault_transactions', JSON.stringify(transactions.slice(0, 20)));
        addLoyaltyPoints(Math.floor(total / 50));
        clearCouponSession();
        showToast('Order placed! Paid from wallet.', 'success');
        navigate('success');
        triggerConfetti();
        setTimeout(() => {
            const allOrders = readLocalJSON('nsvault_orders', []);
            const idx = allOrders.findIndex(o => o.id === order.id);
            if (idx !== -1) { allOrders[idx].status = 'completed'; allOrders[idx].progress = 100; localStorage.setItem('nsvault_orders', JSON.stringify(allOrders)); }
        }, 5000);
    }

    window.proceedToPayment = (total) => {
        const mobile = document.getElementById('orderMobile')?.value;
        if (!mobile || mobile.length < 10) { showToast('Please enter valid mobile number', 'error'); return; }

        const method = window.selectedPaymentMethod || 'wallet';

        if (method === 'wallet') {
            if (wallet >= total) {
                if (walletPin) {
                    requirePin(() => completeWalletOrder(total));
                } else {
                    completeWalletOrder(total);
                }
            } else {
                const needed = total - wallet;
                showToast('Insufficient balance! Need ' + formatPrice(needed) + ' more.', 'error');
                setTimeout(() => {
                    walletRechargeAmount = Math.ceil(needed / 10) * 10;
                    if (walletRechargeAmount < 100) walletRechargeAmount = 100;
                    paymentContext = 'wallet';
                    navigate('payment');
                }, 1800);
            }
            return;
        }

        paymentContext = 'order';
        navigate('payment');
    };

    function goToBanner(index) {
        if (index < 0 || index >= NV_BANNERS.length) return;
        _nvBannerIndex = index;
        const track = document.getElementById('nvBannerTrack');
        if (track) {
            track.style.transform = `translateX(-${index * 100}%)`;
        }
        // Update dots
        document.querySelectorAll('.nv-banner-dot').forEach((d, i) => {
            d.classList.toggle('active', i === index);
        });
        resetBannerProgress();
    }

    function nextBanner() {
        goToBanner((_nvBannerIndex + 1) % NV_BANNERS.length);

    function prevBanner() {
        goToBanner((_nvBannerIndex - 1 + NV_BANNERS.length) % NV_BANNERS.length);

        stopBannerAutoplay();

    function resetBannerProgress() {
        const bar = document.getElementById('nvBannerProgress');
        if (!bar) return;

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {

                bar.style.width = '100%';

    function initBannerSwipe() {
        const track = document.getElementById('nvBannerTrack');
        if (!track) return;
        let startX = 0, startY = 0, moveX = 0, isDragging = false, isScrolling = null;

        track.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isDragging = true;
            isScrolling = null;
            track.classList.add('dragging');
            _nvBannerPaused = true;
        }, { passive: true });

        track.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            moveX = e.touches[0].clientX - startX;
            const moveY = e.touches[0].clientY - startY;
            if (isScrolling === null) {
                isScrolling = Math.abs(moveY) > Math.abs(moveX);
            }
            if (isScrolling) return;
            const offset = -_nvBannerIndex * 100 + (moveX / track.offsetWidth * 100);
            track.style.transform = `translateX(${offset}%)`;
        }, { passive: true });

        track.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            track.classList.remove('dragging');
            _nvBannerPaused = false;
            if (isScrolling) return;
            const threshold = track.offsetWidth * 0.2;
            if (moveX < -threshold) nextBanner();
            else if (moveX > threshold) prevBanner();
            else goToBanner(_nvBannerIndex);
            moveX = 0;
        }, { passive: true });

        // Pause on hover (desktop)
        const wrap = document.getElementById('nvBannerWrap');
        if (wrap) {
            wrap.addEventListener('mouseenter', () => { _nvBannerPaused = true; });
            wrap.addEventListener('mouseleave', () => { _nvBannerPaused = false; });
        }
    }

    function triggerConfetti() {
        const canvas = document.getElementById('confettiCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const colors = ['#4F46E5', '#7C3AED', '#F59E0B', '#10B981', '#F43F5E', '#3B82F6'];
        const pieces = Array.from({ length: APP_CONSTANTS.CONFETTI_PIECES }, () => ({
            x: Math.random() * canvas.width,
            y: -20 - Math.random() * canvas.height * 0.3,
            size: 6 + Math.random() * 6,
            color: colors[Math.floor(Math.random() * colors.length)],
            speedY: 2 + Math.random() * 3,
            speedX: -1.5 + Math.random() * 3,
            rotation: Math.random() * 360,
            rotSpeed: -8 + Math.random() * 16,
        }));
        let frame = 0;
        const maxFrames = APP_CONSTANTS.CONFETTI_MAX_FRAMES;
        function animate() {
            frame++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.x += p.speedX; p.y += p.speedY; p.rotation += p.rotSpeed;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                ctx.restore();
            });
            if (frame < maxFrames) requestAnimationFrame(animate);
            else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        requestAnimationFrame(animate);
    }

    // Global ripple (Material-style) touch/click feedback on any interactive element
    function attachRipple(e) {
        const target = e.target.closest('button, .nav-item, .service-card, .ripple-surface, a.social-btn, [onclick]');
        if (!target) return;
        target.classList.add('ripple-surface');
        const wave = document.createElement('span');
        const size = Math.max(target.offsetWidth, target.offsetHeight) * 1.4;
        const rect = target.getBoundingClientRect();
        const point = e.touches ? e.touches[0] : e;
        const x = (point ? point.clientX : rect.left + rect.width / 2) - rect.left - size / 2;
        const y = (point ? point.clientY : rect.top + rect.height / 2) - rect.top - size / 2;
        wave.className = 'ripple-wave';
        wave.style.width = wave.style.height = size + 'px';
        wave.style.left = x + 'px';
        wave.style.top = y + 'px';
        target.appendChild(wave);
        setTimeout(() => wave.remove(), 650);
    }
    document.addEventListener('pointerdown', attachRipple, { passive: true });

    // IntersectionObserver based scroll-reveal for elements marked [data-animate]
    let scrollRevealObserver = null;
    function initScrollReveal() {
        if (!('IntersectionObserver' in window)) return;
        if (scrollRevealObserver) scrollRevealObserver.disconnect();
        scrollRevealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('in-view');
                    scrollRevealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
        document.querySelectorAll('[data-animate]').forEach(el => scrollRevealObserver.observe(el));
    }
